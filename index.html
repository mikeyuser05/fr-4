<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Interactive Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #38bdf8;
            --neon: #00f2ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden; /* Background particles handle scroll */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animated Background Particles */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Draggable Container */
        .dashboard {
            display: flex;
            gap: 20px;
            padding: 50px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 350px;
            cursor: move;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .card:active { transform: scale(1.02); }

        h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        /* Sketchpad Styles */
        #sketchpad {
            background: #ffffff;
            border-radius: 10px;
            cursor: crosshair;
            width: 100%;
        }

        /* Inputs & Buttons */
        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 10px;
            outline: none;
            border-bottom: 2px solid var(--accent);
        }

        .btn {
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 0 15px var(--neon);
            transform: translateY(-2px);
        }

        .btn-secondary { background: #94a3b8; margin-top: 10px; }

        /* Floating Words */
        .word-bubble {
            display: inline-block;
            background: linear-gradient(45deg, var(--accent), #818cf8);
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px;
            cursor: pointer;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .bust { animation: explode 0.4s forwards; }
        @keyframes explode {
            to { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <h1 style="margin-top: 30px; text-shadow: 0 0 10px var(--accent);">Pro Interactive Hub v3.0</h1>

    <div class="dashboard">
        <div class="card" draggable="true" id="word-card">
            <h2>Word Poker</h2>
            <p>Try: "Party" or "Winner"</p>
            <input type="text" id="word-in" placeholder="Type here...">
            <button class="btn" onclick="spawnWord()">Magic Add</button>
            <div id="word-wall" style="margin-top: 20px;"></div>
        </div>

        <div class="card" draggable="true" id="sketch-card">
            <h2>Neon Sketch</h2>
            <canvas id="sketchpad" width="300" height="250"></canvas>
            <div style="margin-top: 10px;">
                <button class="btn" onclick="clearPad()">Reset</button>
                <button class="btn btn-secondary" onclick="saveImage()">Download PNG</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Background Particles Logic
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];

        function resize() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x > bgCanvas.width) this.x = 0;
                if(this.y > bgCanvas.height) this.y = 0;
            }
            draw() {
                bgCtx.fillStyle = 'rgba(56, 189, 248, 0.5)';
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fill();
            }
        }

        for(let i=0; i<100; i++) particles.push(new Particle());

        function animateBg() {
            bgCtx.clearRect(0,0, bgCanvas.width, bgCanvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // 2. Confetti & Word Logic
        function spawnWord() {
            const input = document.getElementById('word-in');
            const wall = document.getElementById('word-wall');
            const val = input.value.trim();
            if(!val) return;

            // Check for special words
            if(["party", "winner", "success", "congrats"].includes(val.toLowerCase())) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            const span = document.createElement('span');
            span.className = 'word-bubble';
            span.innerText = val;
            span.onclick = function() {
                this.classList.add('bust');
                setTimeout(() => this.remove(), 400);
            };

            wall.appendChild(span);
            input.value = "";
        }

        // 3. Sketchpad with Neon Color
        const canvas = document.getElementById('sketchpad');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        canvas.onmousedown = () => drawing = true;
        canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#38bdf8';
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        };

        function clearPad() { ctx.clearRect(0,0,300,250); }
        
        function saveImage() {
            const link = document.createElement('a');
            link.download = 'my-sketch.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // 4. Simple Drag Logic for Cards
        document.querySelectorAll('.card').forEach(card => {
            card.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', null);
            };
        });
    </script>
</body>
</html>
