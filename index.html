<!DOCTYPE html>
<html>
<head>
    <title>My Pro Interactive Site</title>
    <style>
        /* Variables for easy color switching */
        :root {
            --bg-color: #f0f0f0;
            --card-bg: white;
            --text-color: #333;
            --accent: #6200ee;
        }

        /* This class gets added when we click the Dark Mode button */
        .dark-mode {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --accent: #03dac6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.4s ease;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }

        .poking-text {
            display: inline-block;
            font-size: 28px;
            font-weight: bold;
            color: var(--accent);
            transition: all 0.2s ease;
            cursor: pointer;
            padding: 5px;
        }

        .poking-text:hover {
            transform: scale(1.4) rotate(-5deg);
            filter: drop-shadow(0 0 10px var(--accent));
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-top: 20px;
            background: var(--card-bg);
            color: var(--text-color);
        }

        .btn {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        #dark-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>

    <button id="dark-btn" class="btn" onclick="toggleDark()">Toggle Dark Mode</button>

    <div class="container">
        <h1>Word Poker Pro</h1>
        <p>Type a word and hit enter!</p>
        
        <div id="word-list">
            <span class="poking-text">Hello</span>
        </div>

        <br>
        <input type="text" id="user-input" placeholder="Type here...">
        <button class="btn" onclick="addWord()">Add Word</button>
    </div>

    <script>
        // 1. Function to add words
        function addWord() {
            const input = document.getElementById('user-input');
            const wordList = document.getElementById('word-list');

            if (input.value.trim() !== "") {
                const newSpan = document.createElement('span');
                newSpan.className = 'poking-text';
                newSpan.innerText = input.value;
                
                wordList.append(", ");
                wordList.appendChild(newSpan);
                input.value = "";
            }
        }

        // 2. Function to toggle Dark Mode
        function toggleDark() {
            document.body.classList.toggle('dark-mode');
        }

        // 3. Allow pressing "Enter" key to add word
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                addWord();
            }
        });
    </script>

</body>
</html>
