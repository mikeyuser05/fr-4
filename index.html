<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Interactive Hub</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --card: #e0e5ec;
            --text: #31344b;
            --accent: #6d5dfc;
            --shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
        }

        .dark-mode {
            --bg: #1a1d23;
            --card: #242933;
            --text: #e5e9f0;
            --accent: #88c0d0;
            --shadow: 5px 5px 15px #121417, -5px -5px 15px #2a303a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: 0.5s;
            overflow-x: hidden;
        }

        /* Layout */
        .main-layout {
            display: flex;
            gap: 30px;
            padding: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 350px;
        }

        /* Sketch Pad */
        canvas {
            background: white;
            border-radius: 15px;
            cursor: crosshair;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Word Effects */
        .poking-text {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .bust-animation {
            animation: bust 0.5s forwards !important;
        }

        @keyframes bust {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Buttons & Inputs */
        input {
            padding: 12px;
            border: none;
            border-radius: 10px;
            box-shadow: inset 2px 2px 5px #babecc, inset -5px -5px 10px #ffffff;
            background: var(--bg);
            width: 80%;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.2);
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <button id="theme-toggle" class="btn" onclick="toggleTheme()">🌓 Change Theme</button>

    <h1 style="margin-top: 50px;">Creative Developer Hub</h1>

    <div class="main-layout">
        <div class="card">
            <h2>Word Magician</h2>
            <p>Type "wrong" to see a bust animation!</p>
            <input type="text" id="word-input" placeholder="Type a word...">
            <button class="btn" onclick="addNewWord()">Add & Fly</button>
            <div id="container" style="margin-top: 20px;"></div>
        </div>

        <div class="card">
            <h2>Quick Sketch</h2>
            <canvas id="sketchpad" width="300" height="300"></canvas>
            <br><br>
            <button class="btn" onclick="clearCanvas()">Clear Sketch</button>
        </div>
    </div>

    <script>
        // --- 1. Dark Mode Logic with Storage ---
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
        }

        // --- 2. Word Logic & "Bust" Animation ---
        function addNewWord() {
            const input = document.getElementById('word-input');
            const container = document.getElementById('container');
            const val = input.value.trim();

            if (val === "") return;

            const span = document.createElement('span');
            span.className = 'poking-text';
            span.innerText = val;

            // Spelling check: If "wrong" is in the word, it will bust
            if (val.toLowerCase().includes("wrong") || val.toLowerCase().includes("error")) {
                span.style.background = "#ff4757";
                setTimeout(() => {
                    span.classList.add('bust-animation');
                    setTimeout(() => span.remove(), 500);
                }, 1000);
            }

            span.onclick = () => {
                span.classList.add('bust-animation');
                setTimeout(() => span.remove(), 500);
            };

            container.appendChild(span);
            input.value = "";
        }

        // Enter key support
        document.getElementById('word-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') addNewWord();
        });

        // --- 3. Sketch Pad Logic ---
        const canvas = document.getElementById('sketchpad');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => {
            drawing = false;
            ctx.beginPath();
        });

        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = document.body.classList.contains('dark-mode') ? '#88c0d0' : '#6d5dfc';

            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
